version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fastapi_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fastapi_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fastapi_password}
      - POSTGRES_DB=${POSTGRES_DB:-fastapi_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fastapi_user} -d $${POSTGRES_DB:-fastapi_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fastapi_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-fastapi_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fastapi_password}
      - POSTGRES_DB=${POSTGRES_DB:-fastapi_db}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
