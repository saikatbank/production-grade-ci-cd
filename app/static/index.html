<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Items Dashboard</h1>
            <p>Manage your inventory with speed and style.</p>
        </header>

        <div class="card">
            <h2>Add New Item</h2>
            <form id="add-item-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="E.g., Wireless Mouse">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Item description...."></textarea>
                </div>
                <div class="form-group" style="flex-direction: row; align-items: center;">
                    <input type="checkbox" id="is_active" checked style="width: auto;">
                    <label for="is_active" style="margin: 0;">Is Active?</label>
                </div>
                <button type="submit" class="btn">Add Item</button>
            </form>
        </div>

        <div class="items-section">
            <h2>Current Items</h2>
            <div id="item-list">
                <p style="color: var(--text-muted)">Loading items...</p>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>

</html>
